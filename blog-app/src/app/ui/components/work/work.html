<article class="works__list-item">
    <div class="works__list-item-logo">
        <img
            [src]="src()"
            [alt]="alt()"
        >
    </div>
    <div class="works__list-item-description">
        <p>
            {{ title() }}
        </p>
        <p>
            {{ subtitle() }}
        </p>
        <p>
            {{ description() }}
        </p>
    </div>
</article>
