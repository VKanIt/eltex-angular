<main class="container">
    <section>
        <div class="blogs-first-screen mb-6">
            <div class="blogs-first-screen__title">
                <h1 id="head">
                    Мои статьи
                </h1>
                <p>
                    В статьях я рассказываю о своих интересных проектах, полезных советах и решения проблем, которыми я сталкивался при создании того или ониго проекта.
                </p>
            </div>
            <div class="blogs-first-screen__image">
                <img
                    src="./assets/images/selection.png"
                    alt="selection"
                >
            </div>
        </div>
        
        <div class="card-blog-list m-wrap">
            @for (item of blogsStore.blogs(); track $index) {
                <div class="card-blog-min">
                    <app-card-blog 
                        [blog]="item"
                        (delete)="deleteBlog($index)"
                        (edit)="openModalEditBlog($index, $event)"
                    />
                </div>
            } @empty {
                <div
                    class="blogs-empty"
                    [hidden]="!blogsRepository.isLoad()"
                >
                    Нет статей
                </div>
            }
        </div>
        <div
            class="content-center"
            [hidden]="blogsStore.count <= blogsStore.limitActive"
        >
            <button 
                class="btn btn-outline"
                [hidden]="!blogsRepository.isLoad()"
                (click)="blogsRepository.getBlogs(true)"
            >
                Показать еще
            </button>    
        </div>

        <div 
            class="loader"
            [hidden]="blogsRepository.isLoad()"
        ></div>
    </section>

    <div class="admin-panel">
        <button
            class="btn-icon"
            title="Добавить статью"
            (click)="openModalAddBlog()"
        >
            <svg>
                <use xlink:href="./assets/sprite-svg/add-blog.svg#add-blog" />
            </svg>
        </button>
        <button
            class="btn-icon"
            title="Показать статистику"
            (click)="openModalStatisticBlogs()"
        >
            <svg>
                <use xlink:href="./assets/sprite-svg/statistic.svg#statistic" />
            </svg>
        </button>
    </div>
</main>
