<main class="container">
    <app-main-first-page class="mb-6" />
    <section 
        class="mb-6"
        [hidden]="blogsStore.count === 0"
    >
        <div class="card-blog-list">
             @for (item of blogsStore.blogs(); track $index) {
                <div class="card-blog mb-3">
                    <app-card-blog 
                        [blog]="item"
                        [isBigCard]="true"
                    />
                </div>
            }
        </div>

        <div 
            class="loader"
            [hidden]="blogsRepository.isLoad()"
        ></div>

        <div 
            class="content-center"
            [hidden]="!blogsRepository.isLoad() || blogsStore.count === 0"
        >
            <a
                routerLink="/blogs/"
                class="btn btn-outline"
            >
                Посмотреть все посты
            </a>    
        </div>
    </section>

    <app-skills class="mb-6" />
    
    <app-works class="mb-6" />

    <app-hobbies />
</main>
